name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + eval (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pytest
        run: pytest -q

      - name: Run evaluation harness
        run: python -m eval.run --fixtures eval/fixtures --report eval/last_run.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-eval-py${{ matrix.python }}
          path: eval/last_run.json
          if-no-files-found: warn

  diff-gate:
    name: differential gate (severity drift)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .[dev]

      - name: Build current index
        run: |
          rm -rf data/index.sqlite
          aegis scan src --max-bytes 4194304 || true

      - name: Compare against committed baseline (if any)
        run: |
          if [ -f baselines/index.sqlite ]; then
            python -m aegis.cli.diff baselines/index.sqlite data/index.sqlite \
              --fail-on critical,high
          else
            echo "no baseline committed; skipping diff gate"
          fi
