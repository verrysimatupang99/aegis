name: Release (PyPI + sigstore)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # required for sigstore + PyPI trusted publishing

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    outputs:
      artifact-name: dist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install --upgrade build
      - name: Build distributions
        run: python -m build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  sign:
    name: Sigstore sign
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Sign with sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: dist/*.tar.gz dist/*.whl
          upload-signing-artifacts: true

  pypi:
    name: Publish to PyPI (trusted)
    needs: sign
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aegis-sec
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Trusted publishing: configure PyPI project to accept this repo+workflow.
          # No password required; uses OIDC.
